<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE RIGHT | MULTI-VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Tenor+Sans&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --off-white: #F9F8F6;
            --brushed-gold: #B89D64;
            --charcoal: #1A1A1A;
            --gold-leaf: #D4AF37;
        }

        body { 
            background-color: var(--off-white); 
            font-family: 'Tenor Sans', sans-serif; 
            overflow-x: hidden;
            perspective: 1500px;
        }

        header {
            padding: 40px;
            text-align: center;
            background: var(--off-white);
            z-index: 100;
            position: relative;
        }

        .brand-logo { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 12px; }

        /* Container for all cubes */
        .vault-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 100px;
            padding: 100px 50px;
            transform-style: preserve-3d;
        }

        /* Individual Cube Wrapper */
        .cube-scene {
            width: 200px;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .cube-scene:hover { transform: scale(1.1); }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: floatRotate 15s infinite linear;
        }

        @keyframes floatRotate {
            0% { transform: rotateY(0deg) rotateX(15deg); }
            100% { transform: rotateY(360deg) rotateX(15deg); }
        }

        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--charcoal);
            border: 1px solid var(--brushed-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            color: var(--gold-leaf);
            text-align: center;
            padding: 10px;
            backface-visibility: visible;
            box-shadow: inset 0 0 30px rgba(184, 157, 100, 0.2);
        }

        /* Face positions */
        .f { transform: translateZ(100px); }
        .bk { transform: rotateY(180deg) translateZ(100px); }
        .r { transform: rotateY(90deg) translateZ(100px); }
        .l { transform: rotateY(-90deg) translateZ(100px); }
        .t { transform: rotateX(90deg) translateZ(100px); }
        .bm { transform: rotateX(-90deg) translateZ(100px); }

        /* Modal / Description Overlay */
        .modal {
            position: fixed; inset: 0;
            background: rgba(249, 248, 246, 0.98);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 10%;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content { text-align: center; max-width: 600px; }
        .modal-content h2 { font-family: 'Cinzel', serif; color: var(--brushed-gold); margin-bottom: 20px; }
        .modal-content p { font-family: 'Montserrat', sans-serif; line-height: 1.8; color: #555; margin-bottom: 30px; }
        .close-btn { font-family: 'Montserrat'; font-size: 0.7rem; letter-spacing: 3px; cursor: pointer; color: var(--charcoal); text-decoration: underline; }

    </style>
</head>
<body>

    <header>
        <div class="brand-logo">BE RIGHT</div>
        <p style="font-size: 0.6rem; letter-spacing: 3px; margin-top: 10px;">SELECT A VAULT NODE TO DECRYPT</p>
    </header>

    <div class="vault-grid" id="vaultGrid">
        </div>

    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <h2 id="modalTitle">SERVICE NAME</h2>
            <p id="modalDesc">Service description goes here...</p>
            <div class="close-btn" onclick="closeModal()">CLOSE SYSTEM</div>
        </div>
    </div>

    <script>
        const services = [
            { t: "Business Consultation", d: "Professional guidance to help identify challenges and create effective solutions." },
            { t: "Strategic Planning", d: "Structured planning to achieve long-term business growth and stability." },
            { t: "Market Research", d: "In-depth research to understand market trends customer needs and competitors." },
            { t: "Brand Development", d: "Building strong brand identity values and market positioning." },
            { t: "Software Design", d: "Tailored software solutions for business automation and growth." },
            { t: "Security Systems", d: "Protection of systems data and networks from threats." }
        ];

        const grid = document.getElementById('vaultGrid');

        services.forEach(service => {
            const scene = document.createElement('div');
            scene.className = 'cube-scene';
            scene.onclick = () => openModal(service.t, service.d);

            scene.innerHTML = `
                <div class="cube">
                    <div class="cube-face f">${service.t}</div>
                    <div class="cube-face bk">${service.t}</div>
                    <div class="cube-face r">${service.t}</div>
                    <div class="cube-face l">${service.t}</div>
                    <div class="cube-face t">BE RIGHT</div>
                    <div class="cube-face bm">VAULT</div>
                </div>
            `;
            grid.appendChild(scene);
        });

        function openModal(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('serviceModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('serviceModal').style.display = 'none';
        }
    </script>
</body>
</html>
